<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Campus Marketplace</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="navbar">
        <h1>Campus Marketplace</h1>
    </header>

    <main class="container auth-container">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-message" style="background-color: #fef08a; color: #854d0e; border-color: #fde047;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="info-box" style="background-color: #f9fafb;">
            <h2 style="margin-bottom: 10px; text-align: center;">Join the Campus</h2>
            <p style="text-align: center; color: #6b7280; margin-bottom: 20px; font-size: 14px;">Create an account to start buying and selling.</p>
            
            <form action="/signup" method="POST" class="listing-form">
                <input type="text" name="username" placeholder="Choose a Username" required>
                
                <div class="password-wrapper">
                    <input type="password" name="password" id="signup-password" placeholder="Create a Password" required>
                    <button type="button" class="toggle-password" onclick="toggleVisibility('signup-password', this)">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>

                <div class="password-wrapper">
                    <input type="password" name="confirm_password" id="confirm-password" placeholder="Confirm Password" required>
                    <button type="button" class="toggle-password" onclick="toggleVisibility('confirm-password', this)">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
                
                <button type="submit" class="buy-button" style="margin-top: 10px; background-color: #2563eb;">Create Account</button>
            </form>
            
            <p class="auth-link">Already have an account? <a href="/">Log in here</a></p>
        </div>
    </main>

    <script>
        function toggleVisibility(inputId, buttonElement) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                buttonElement.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>`;
            } else {
                input.type = "password";
                buttonElement.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>`;
            }
        }
    </script>
</body>
</html>
